title: Applied Deep Learning
description: ECBS5200 — Practical Deep Learning Engineering for Applied ML
remote_theme: just-the-docs/just-the-docs@v0.10.0
color_scheme: light

search_enabled: true

aux_links:
  "GitHub Repo": "https://github.com/earino/applied-deep-learning"

footer_content: "ECBS5200 &mdash; Central European University, Vienna &mdash; Spring 2026"

back_to_top: true
back_to_top_text: "Back to top"

# Exclude directories from Jekyll processing (prevents stray .md files
# from appearing in the sidebar). Static files like .html, .ipynb, .json
# are still served — only .md rendering is suppressed.
exclude:
  - README.md
  - LICENSE.md
  - data/
  - utils/

# These directories contain static files (slides, notebooks) that must
# be served but not processed as Jekyll pages
defaults:
  - scope:
      path: "pre-work"
    values:
      nav_exclude: true
  - scope:
      path: "week1"
    values:
      nav_exclude: true
  - scope:
      path: "week2"
    values:
      nav_exclude: true
  - scope:
      path: "week3"
    values:
      nav_exclude: true
  - scope:
      path: "week4"
    values:
      nav_exclude: true
  - scope:
      path: "week5"
    values:
      nav_exclude: true
  - scope:
      path: "week6"
    values:
      nav_exclude: true
